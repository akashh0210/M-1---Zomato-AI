<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Restaurant Recommender</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="bg-mesh">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container">
        <header>
            <h1>AI Restaurant Recommender</h1>
            <p>Discover your next favorite meal perfectly tailored to your tastes.</p>
        </header>

        <main>
            <section class="glass-panel form-panel">
                <form id="recommendation-form">
                    <div class="form-group">
                        <label for="location">Location</label>
                        <select id="location" name="location" required>
                            <option value="" disabled selected>Loading locations...</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="cuisine">Cuisine</label>
                        <input type="text" id="cuisine" name="cuisine" placeholder="e.g. North Indian" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group half">
                            <label for="budget">Max Budget (for two)</label>
                            <input type="number" id="budget" name="budget" placeholder="e.g. 1000" min="0" step="50" required>
                        </div>
                        
                        <div class="form-group half">
                            <label for="min_rating">Min Rating</label>
                            <input type="number" id="min_rating" name="min_rating" min="0" max="5" step="0.1" value="3.5" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary" id="submit-btn">
                        <span class="btn-text">Find Options</span>
                        <div class="loader hidden"></div>
                    </button>
                </form>
            </section>

            <section id="results-section" class="results-section hidden">
                <div id="message-banner" class="message-banner"></div>
                <div id="cards-container" class="cards-container">
                    <!-- Cards injected via JS -->
                </div>
            </section>
        </main>
    </div>
    
    <script src="/static/app.js"></script>
</body>
</html>
