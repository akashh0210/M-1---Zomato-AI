services:
  - type: web
    name: zomato-ai-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python scripts/run_api.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: PORT
        value: 8000
      - key: GROQ_API_KEY
        generateValue: true # The user must override this with their real API Key in Render Dashboard
